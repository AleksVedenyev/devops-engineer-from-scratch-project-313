name: ci-check

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13' 

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Cache 
        id: cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uv.lock-${{ hashFiles('**/uv.lock') }}-python-3.13

      - name: Install dependencies (lockfile workflow)
        run: uv sync --frozen

      - name: Ruff check
        run: make lint

      - name: Pytest
        run: make test
