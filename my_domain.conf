server {
    listen 80 default_server;

    server_name _;

    location / {
        root /app/public;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
    }

    location /r/ {
        proxy_pass http://127.0.0.1:8080;
    }
}